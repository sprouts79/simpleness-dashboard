<style>

  .pill { display: inline-flex; align-items: center; justify-content: center; padding: 1px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; border: 1px solid; line-height: 1.3; height: 20px; }

  .pill-explore  { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
  .pill-exploit  { background: #fef3c7; color: #92400e; border-color: #fde68a; }
  .pill-burnt    { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
  .pill-suppr    { background: #f5f5f5; color: #525252; border-color: #d4d4d4; }

  .hero-title { font-size: 1.0625rem; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; color: #404040; margin-top: 0; }
  .hero-meta { font-size: 12px; color: #737373; }
  .hero-kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
  .hero-kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; color: #737373; }
  .hero-kpi-value { font-size: 1.5rem; font-weight: 700; line-height: 1; letter-spacing: -0.02em; margin-top: 6px; }
  .hero-kpi-sub { font-size: 11px; color: #737373; margin-top: 6px; }

  .hero-compact .hero-kpi-value { font-size: 1.25rem; }

  .hero-compact .stack.tall { height: 14px; }
  .hero-compact .stack-legend { font-size: 11px; gap: 12px; }

  /* Hero clickable */
  .hero-clickable { cursor: pointer; transition: border-color 80ms; }
  .hero-clickable:hover { border-color: #a3a3a3; }

  /* Dark hero (kvartalsbanner) */
  .hero-dark { background: #090a08; border-color: #090a08; color: white; }
  .hero-dark .hero-title { color: white; }
  .hero-dark .hero-kpi-label { color: rgba(255,255,255,0.7); }
  .hero-dark .hero-kpi-sub { color: rgba(255,255,255,0.6); }
  .hero-dark .stack { background: rgba(255,255,255,0.1); }

  .breadcrumb { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #525252; }
  .breadcrumb a { color: #1f2937; text-decoration: none; padding: 3px 8px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; }
  .breadcrumb a:hover { background: white; border-color: #e5e5e5; }
  .breadcrumb .sep { color: #a3a3a3; }
  .breadcrumb .active { color: #090a08; font-weight: 600; }

// ─── Helpers ──────────────────────────────────────────────────────────────

function fmtKr(v) { if (v == null) return '—'; if (v >= 1000) return `${(v / 1000).toFixed(v >= 10000 ? 0 : 1)}k`; return Math.round(v).toString(); }
function fmtNum(v, d=0) { return v == null ? '—' : v.toFixed(d); }
function pct(v) { return `${Math.round(v * 100)}%`; }
function pctSigned(v, decimals=1) {
  if (v == null) return '—';
  const sign = v > 0 ? '+' : '';
  return `${sign}${(v * 100).toFixed(decimals)} %`;
}

function deltaTone(delta, higherIsBad) {
  if (delta == null) return 'text-neutral-400';
  const good = higherIsBad ? delta < 0 : delta > 0;
  if (Math.abs(delta) < 0.01) return 'text-neutral-500';
  return good ? 'text-emerald-700' : 'text-rose-700';
}

function deltaToneDark(delta, higherIsBad) {
  if (delta == null) return 'text-neutral-400';
  const good = higherIsBad ? delta < 0 : delta > 0;
  if (Math.abs(delta) < 0.01) return 'text-neutral-300';
  return good ? 'text-emerald-300' : 'text-rose-300';
}

function distribution(ads) {
  const sum = STATUS_ORDER.reduce((s, st) => s + (ads[st] || 0), 0);
  return STATUS_ORDER.map(st => ({ status: st, share: sum > 0 ? (ads[st] || 0) / sum : 0 }));
}

function stackHtml(segs, classPrefix='seg') {
  return segs.filter(s => s.share > 0).map(s => `<div class="${classPrefix}-${s.status || s.slug}" style="width:${s.share * 100}%"></div>`).join('');
}

function legendHtml(segs, getColor, getLabel) {
  return segs.filter(s => s.share > 0).map(s => `<div><span class="stack-legend-dot" style="background:${getColor(s)}"></span><span>${getLabel(s)} <span class="mono text-neutral-500 ml-0.5">${pct(s.share)}</span></span></div>`).join('');
}

// ─── Navigation ──────────────────────────────────────────────────────────

function navTo(rapport) {
  state.rapport = rapport;
  if (rapport === 'resultat') {
    state.quarter = 2;
    state.month = null;
  } else {
    state.kanal = null;
    state.kampanje = null;
  }
  document.getElementById('nav-resultat').className = rapport === 'resultat' ? 'active' : '';
  document.getElementById('nav-kanal').className = rapport === 'kanal' ? 'active' : '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setQuarter(q) { state.quarter = q; state.month = null; render(); }
function setMonth(m) { state.month = m; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function setKanal(slug) { state.kanal = slug; state.kampanje = null; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function setKampanje(id) { state.kampanje = id; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function clearKanalNav(level) {
  if (level === 0) { state.kanal = null; state.kampanje = null; }
  else if (level === 1) { state.kampanje = null; }
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function setPeriode(v) { state.periode = v; render(); }
function setGrouping(v) { state.grouping = v; render(); }

          <select class="group-select" onchange="setGrouping(this.value)">
            <option value="none" ${state.grouping === 'none' ? 'selected' : ''}>Ingen</option>
            <option value="adset" ${state.grouping === 'adset' ? 'selected' : ''}>Ad set</option>
            <option value="format" ${state.grouping === 'format' ? 'selected' : ''}>Format</option>
          </select>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden">
        <table>
          <thead><tr><th>Navn</th><th class="num-sm">Spend</th><th class="num-sm">CPMr</th><th class="num-sm">Frekvens</th><th class="num-sm">ROAS</th><th class="col-status">Status</th></tr></thead>
          <tbody>
            ${META_ANNONSER.map(a => `
              <tr>
                <td><div class="ad-name"><div class="ad-thumb"></div><span class="text-neutral-800 truncate">${a.name}</span></div></td>
                <td class="num-sm mono font-semibold">${fmtKr(a.spend)}</td>
                <td class="num-sm mono">${a.cpm == null ? '—' : Math.round(a.cpm)}</td>
                <td class="num-sm mono">${a.freq == null ? '—' : a.freq.toFixed(1)}</td>
                <td class="num-sm mono">${a.roas == null ? '—' : a.roas.toFixed(1) + '×'}</td>
                <td class="col-status"><span class="pill pill-${a.status}">${STATUS_LABELS[a.status]}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <p class="eyebrow mb-3">Kreativ diversifisering</p>
      <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden">
        <table>
          <thead><tr><th>Dimensjon</th><th class="num-sm">Dekket</th><th>Verdier</th><th class="num-sm">Aktive ads</th></tr></thead>
          <tbody>
            ${dims.map(d => {
              const tot = d.covered.length + d.missing.length;
              const tags = [...d.covered.map(v => `<span class="tag tag-covered">${v}</span>`), ...d.missing.map(v => `<span class="tag tag-missing">${v}</span>`)].join('');
              return `<tr>
                <td class="font-medium text-neutral-800">${d.name}</td>
                <td class="num-sm mono"><span class="font-semibold">${d.covered.length}</span><span class="text-neutral-400">/${tot}</span></td>
                <td><div class="dim-values">${tags}</div></td>
                <td class="num-sm mono text-neutral-500">${d.activeAds}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      <p class="text-xs text-neutral-500 mt-2">Bare ads i Test/Explore/Exploit teller — Burnt-out og Suppressed ikke.</p>
    </section>
  `;

  return html;
}

// ─── Main render ─────────────────────────────────────────────────────────

function render() {
  renderBreadcrumb();
  renderPeriodControl();
  const main = document.getElementById('main-view');
  if (state.rapport === 'resultat') {
    if (state.month === null) main.innerHTML = renderResultatNiva1();
    else main.innerHTML = renderResultatNiva2();
  } else {
    if (!state.kanal) main.innerHTML = renderKanalNiva1();
    else if (!state.kampanje) main.innerHTML = renderKanalNiva2();
    else main.innerHTML = renderKanalNiva3();
  }
}

render();
</script>

</body>
</html>
