<style>
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #fafafa; color: #090a08; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: #737373; }

  /* Breadcrumb */
  .breadcrumb { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #525252; }
  .breadcrumb a { color: #1f2937; text-decoration: none; padding: 3px 8px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; }
  .breadcrumb a:hover { background: white; border-color: #e5e5e5; }
  .breadcrumb .sep { color: #a3a3a3; }
  .breadcrumb .active { color: #090a08; font-weight: 600; }

  /* Hero card */
  .hero { background: white; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1.5rem 1.75rem; }
  .hero-title { font-size: 1.0625rem; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; color: #404040; margin-top: 0; }
  .hero-meta { font-size: 12px; color: #737373; }
  .hero-kpis { display: grid; gap: 24px; }
  .hero-kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; color: #737373; }
  .hero-kpi-value { font-size: 1.5rem; font-weight: 700; line-height: 1; letter-spacing: -0.02em; margin-top: 6px; }
  .hero-kpi-sub { font-size: 11px; color: #737373; margin-top: 6px; }
  .hero-kpi-target { font-size: 11px; color: #525252; margin-top: 4px; }

  /* Cards */
  .card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem 1.5rem; }
  .card-hover { cursor: pointer; transition: border-color 80ms; }
  .card-hover:hover { border-color: #a3a3a3; }

  /* Stack-bar */
  .stack { display: flex; height: 14px; border-radius: 999px; overflow: hidden; background: #f5f5f5; }
  .stack.tall { height: 18px; }
  .stack > div { display: block; }
  .stack-legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; margin-top: 10px; }
  .stack-legend > div { display: flex; align-items: center; gap: 6px; color: #525252; }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; }

  /* Channel colors */
  .ch-meta    { background: #2563eb; }
  .ch-google  { background: #34d399; }
  .ch-snap    { background: #fbbf24; }
  .ch-tiktok  { background: #ec4899; }
  .ch-ohh     { background: #a78bfa; }
  .ch-manuell { background: #94a3b8; }

  /* Ad-status colors (samme som prototype-lab-v3) */
  .seg-test    { background: #93c5fd; }
  .seg-explore { background: #34d399; }
  .seg-exploit { background: #fbbf24; }
  .seg-burnt   { background: #f87171; }
  .seg-suppr   { background: #d4d4d4; }

  /* Mål-type colors */
  .typ-konv    { background: #1f2937; }
  .typ-rekk    { background: #94a3b8; }

  /* KPI row item */
  .delta-up   { color: #15803d; }
  .delta-down { color: #b91c1c; }
  .delta-flat { color: #737373; }

  /* Target progress */
  .progress { width: 100%; height: 6px; background: #f5f5f5; border-radius: 999px; overflow: hidden; }
  .progress > div { height: 100%; background: #1f2937; }
  .progress.green > div { background: #15803d; }

  /* List rows */
  .row { display: grid; align-items: center; gap: 16px; padding: 14px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: background 60ms; }
  .row:last-child { border-bottom: 0; }
  .row:hover { background: #fafafa; }
  .row-name { font-weight: 600; font-size: 14px; color: #1f2937; }
  .row-sub { font-size: 11px; color: #737373; }
  .row-num { text-align: right; }
  .row-num-value { font-weight: 600; font-size: 14px; }
  .row-num-delta { font-size: 11px; color: #737373; margin-top: 2px; }

  /* Pills */
  .pill { display: inline-flex; align-items: center; padding: 1px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; border: 1px solid; line-height: 1.3; height: 20px; }
  .pill-test     { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
  .pill-explore  { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
  .pill-exploit  { background: #fef3c7; color: #92400e; border-color: #fde68a; }
  .pill-burnt    { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
  .pill-suppr    { background: #f5f5f5; color: #525252; border-color: #d4d4d4; }
  .pill-konv     { background: #f8fafc; color: #0f172a; border-color: #cbd5e1; }
  .pill-rekk     { background: #f8fafc; color: #475569; border-color: #cbd5e1; }
  .pill-godkjent { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
  .pill-utkast   { background: #fef3c7; color: #92400e; border-color: #fde68a; }

  /* Sammenheng-panel — distinct background */
  .panel-sammen { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem 1.5rem; }
  .panel-sammen .panel-title { font-size: 13px; font-weight: 600; color: #1f2937; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .panel-sammen .panel-title .icon { width: 14px; height: 14px; border-radius: 3px; background: #d4d4d4; }

  /* Comment box */
  .comment-box { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.5rem; }
  .comment-section { margin-bottom: 1rem; }
  .comment-section:last-child { margin-bottom: 0; }
  .comment-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; color: #737373; margin-bottom: 6px; }
  .comment-text { font-size: 14px; line-height: 1.6; color: #1f2937; }

  /* Toggle */
  .toggle { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; border: 1px solid; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 80ms; }
  .toggle-off { background: white; color: #525252; border-color: #e5e5e5; }
  .toggle-off:hover { border-color: #a3a3a3; }
  .toggle-on { background: #1f2937; color: white; border-color: #1f2937; }

  /* Cohort heatmap */
  .heatmap { display: grid; grid-template-columns: 140px repeat(5, 1fr); gap: 4px; font-size: 12px; }
  .heatmap-header { font-weight: 600; color: #737373; text-align: center; padding: 8px 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .heatmap-row-label { padding: 12px 4px; color: #525252; font-weight: 500; }
  .heatmap-cell { padding: 12px 8px; text-align: center; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }

  /* Ad thumb */
  .ad-thumb { width: 96px; height: 96px; border-radius: 8px; background: linear-gradient(135deg, #d4d4d4, #a3a3a3); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 600; }
  .ad-thumb-sm { width: 36px; height: 36px; border-radius: 5px; background: linear-gradient(135deg, #d4d4d4, #a3a3a3); flex-shrink: 0; }

  /* Sparkbar (mini bar chart) */
  .sparkbar { display: flex; align-items: flex-end; gap: 2px; height: 32px; }
  .sparkbar > div { flex: 1; background: #cbd5e1; border-radius: 1px; min-height: 2px; }
  .sparkbar > div.active { background: #1f2937; }
</style>

// ─── State ───────────────────────────────────────────────────────────────

const state = {
  niva: 1,
  kanal: null,       // 'meta' | …
  kampanje: null,    // 'bau-2026' | …
  annonse: null,     // 'madeleine-v2' | …
  visning: 'intern', // 'intern' | 'kunde'
  diagnose: true,    // intern-toggle
};

// ─── Helpers ─────────────────────────────────────────────────────────────

function fmtNum(n, prefix = '') {
  if (n === null || n === undefined) return '—';
  if (n >= 1000000) return `${prefix}${(n/1000000).toFixed(1)}M`;
  if (n >= 1000) return `${prefix}${Math.round(n/1000)}k`;
  return `${prefix}${Math.round(n)}`;
}

function fmtKr(n) { return n === null || n === undefined ? '—' : `${fmtNum(n)} kr`; }
function fmtPct(n, d=1) { return n === null || n === undefined ? '—' : `${n.toFixed(d)} %`; }
function fmtRoas(n) { return n === null || n === undefined ? '—' : `${n.toFixed(1)}x`; }

function fmtDelta(d, lower_is_better=false) {
  if (d === null || d === undefined || d === 0) return `<span class="delta-flat">stabil</span>`;
  const pct = (d * 100).toFixed(0);
  const good = lower_is_better ? d < 0 : d > 0;
  const arrow = d > 0 ? '↗' : '↘';
  const cls = good ? 'delta-up' : 'delta-down';
  return `<span class="${cls}">${arrow} ${pct > 0 ? '+' : ''}${pct} %</span>`;
}

function statusPill(status) {
  return `<span class="pill pill-${status}">${STATUS_LABELS[status]}</span>`;
}

function typePill(type) {
  return type === 'konvertering' ? `<span class="pill pill-konv">Konvertering</span>` : `<span class="pill pill-rekk">Rekkevidde</span>`;
}

// ─── Navigation ──────────────────────────────────────────────────────────

function navigate(niva, opts = {}) {
  state.niva = niva;
  if (opts.kanal !== undefined) state.kanal = opts.kanal;
  if (opts.kampanje !== undefined) state.kampanje = opts.kampanje;
  if (opts.annonse !== undefined) state.annonse = opts.annonse;
  // Clear deeper levels
  if (niva < 2) state.kanal = null;
  if (niva < 3) state.kampanje = null;
  if (niva < 4) state.annonse = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleView() {
  state.visning = state.visning === 'intern' ? 'kunde' : 'intern';
  const btn = document.getElementById('toggle-view');
  const label = document.getElementById('toggle-view-label');
  btn.className = state.visning === 'intern' ? 'toggle toggle-on' : 'toggle toggle-off';
  label.textContent = state.visning === 'intern' ? 'Intern' : 'Kunde';
  // I kunde-modus: diagnose alltid av, og maks Nivå 3
  if (state.visning === 'kunde') {
    state.diagnose = false;
    if (state.niva === 4) state.niva = 3;
    updateDiagnoseToggle();
  }
  render();
}

function toggleDiagnose() {
  if (state.visning === 'kunde') return; // Diagnose ikke tilgjengelig for kunde
  state.diagnose = !state.diagnose;
  updateDiagnoseToggle();
  render();
}

function updateDiagnoseToggle() {
  const btn = document.getElementById('toggle-diagnose');
  const label = document.getElementById('toggle-diagnose-label');
  btn.className = state.diagnose ? 'toggle toggle-on' : 'toggle toggle-off';
  label.textContent = state.diagnose ? 'Diagnose: på' : 'Diagnose: av';
  btn.style.opacity = state.visning === 'kunde' ? '0.4' : '1';
  btn.style.cursor = state.visning === 'kunde' ? 'not-allowed' : 'pointer';
}

// ─── Render functions ────────────────────────────────────────────────────

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const crumbs = [];

  if (state.niva === 1) {
    bc.innerHTML = `<span class="active">${KUNDE.navn} · Konto</span>`;
    return;
  }
  crumbs.push(`<a onclick="navigate(1)">${KUNDE.navn} · Konto</a>`);

  if (state.niva >= 2 && state.kanal) {
    const kanal = KANALER.find(k => k.slug === state.kanal);
    if (state.niva === 2) {
      crumbs.push(`<span class="active">${kanal.navn}</span>`);
    } else {
      crumbs.push(`<a onclick="navigate(2, {kanal: '${kanal.slug}'})">${kanal.navn}</a>`);
    }
  }

  if (state.niva >= 3 && state.kampanje) {
    if (state.niva === 3) {
      crumbs.push(`<span class="active">${KAMPANJE_BAU.navn}</span>`);
    } else {
      crumbs.push(`<a onclick="navigate(3, {kampanje: '${KAMPANJE_BAU.id}'})">${KAMPANJE_BAU.navn}</a>`);
    }
  }

  if (state.niva >= 4 && state.annonse) {
    crumbs.push(`<span class="active">${ANNONSE_MADELEINE.navn} · ${ANNONSE_MADELEINE.versjon}</span>`);
  }

  bc.innerHTML = crumbs.join(' <span class="sep">›</span> ');
}

function renderStack(segments, totalLabel = null) {
  const total = segments.reduce((s, x) => s + x.value, 0);
  const bars = segments.map(s => {
    const pct = (s.value / total) * 100;
    return `<div class="${s.cls}" style="width: ${pct}%"></div>`;
  }).join('');
  const legend = segments.map(s => {
    return `<div><span class="legend-dot ${s.cls}"></span> ${s.label} ${fmtKr(s.value)} (${Math.round((s.value/total)*100)}%)</div>`;
  }).join('');
  return `<div class="stack tall">${bars}</div><div class="stack-legend">${legend}</div>`;
}

        <div><div class="hero-kpi-label">Hook</div><div class="hero-kpi-value mono">${a.hook} %</div><div class="hero-kpi-sub delta-flat">stabil</div></div>
        <div><div class="hero-kpi-label">Hold</div><div class="hero-kpi-value mono">${a.hold} %</div><div class="hero-kpi-sub delta-up">↗ +3p</div></div>
        ` : ''}
      </div>
    </div>

    <!-- Utvikling over tid -->
    <section class="mb-8">
      <p class="eyebrow mb-3">Utvikling siste 8 uker</p>
      <div class="grid grid-cols-2 gap-3">
        <div class="card">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium">Spend + ROAS</span>
            <span class="text-xs text-neutral-500">W12 – W19</span>
          </div>
          <div class="sparkbar">${[0.4, 0.5, 0.55, 0.7, 0.85, 0.95, 1.0, 0.9].map((v,i) => `<div class="${i >= 5 ? 'active' : ''}" style="height: ${v*100}%"></div>`).join('')}</div>
        </div>
        <div class="card">
          <div class="flex items-center justify-between mb-2">
            <span class="text-sm font-medium">Hook + Hold</span>
            <span class="text-xs text-neutral-500">W12 – W19</span>
          </div>
          <div class="sparkbar">${[0.55, 0.6, 0.65, 0.7, 0.72, 0.78, 0.85, 0.88].map((v,i) => `<div class="${i >= 5 ? 'active' : ''}" style="height: ${v*100}%"></div>`).join('')}</div>
        </div>
      </div>
    </section>

    <!-- Sammenheng 1: innen samme tema -->
    <section class="mb-6">
      <p class="eyebrow mb-3">Sammenheng · innen samme tema ("${a.tema}")</p>
      <div class="panel-sammen">
        <div class="card" style="padding: 0; background: white;">
          ${a.tema_annonser.map(t => `
            <div class="row" style="grid-template-columns: 1fr auto auto;${t.current ? 'background: #f8fafc;' : ''}">
              <div>
                <div class="row-name">${t.navn}</div>
              </div>
              <div class="row-num"><div class="row-num-value mono">${fmtKr(t.spend)}</div></div>
              <div class="row-num"><div class="row-num-value mono">${fmtRoas(t.roas)}</div></div>
            </div>
          `).join('')}
        </div>
        <p class="text-xs text-neutral-500 mt-3">Denne annonsen er beste utøveren på temaet.</p>
      </div>
    </section>

    <!-- Sammenheng 2: cohort -->
    <section class="mb-6">
      <p class="eyebrow mb-3">Sammenheng · samme cohort (${a.cohort})</p>
      <div class="panel-sammen">
        <div class="card" style="padding: 0; background: white;">
          ${a.cohort_annonser.map(c => `
            <div class="row" style="grid-template-columns: 1fr auto;${c.current ? 'background: #f8fafc;' : ''}">
              <div>
                <div class="row-name">${c.navn}</div>
              </div>
              <div class="row-num"><div class="row-num-value mono">${fmtRoas(c.roas)}</div></div>
            </div>
          `).join('')}
        </div>
        <p class="text-xs text-neutral-500 mt-3">Snitt for cohort: ROAS 2.5x — over snitt.</p>
      </div>
    </section>

    <!-- Sammenheng 3: format-benchmark -->
    ${showDiagnose ? `
    <section class="mb-6">
      <p class="eyebrow mb-3">Sammenheng · format-benchmark</p>
      <div class="panel-sammen">
        <div class="card" style="padding: 0; background: white;">
          <div class="grid" style="grid-template-columns: 1fr repeat(3, 100px); padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; color: #737373;">
            <div></div>
            <div class="text-right">ROAS</div>
            <div class="text-right">Hook</div>
            <div class="text-right">Hold</div>
          </div>
          <div class="grid" style="grid-template-columns: 1fr repeat(3, 100px); padding: 14px 16px; background: #f8fafc; border-bottom: 1px solid #f5f5f5;">
            <div class="row-name">Denne annonsen</div>
            <div class="row-num row-num-value mono">${fmtRoas(a.format_benchmark.denne.roas)}</div>
            <div class="row-num row-num-value mono">${a.format_benchmark.denne.hook} %</div>
            <div class="row-num row-num-value mono">${a.format_benchmark.denne.hold} %</div>
          </div>
          <div class="grid" style="grid-template-columns: 1fr repeat(3, 100px); padding: 14px 16px; border-bottom: 1px solid #f5f5f5;">
            <div class="row-name">Snitt video</div>
            <div class="row-num row-num-value mono">${fmtRoas(a.format_benchmark.video.roas)}</div>
            <div class="row-num row-num-value mono">${a.format_benchmark.video.hook} %</div>
            <div class="row-num row-num-value mono">${a.format_benchmark.video.hold} %</div>
          </div>
          <div class="grid" style="grid-template-columns: 1fr repeat(3, 100px); padding: 14px 16px; border-bottom: 1px solid #f5f5f5;">
            <div class="row-name text-neutral-500">Snitt static</div>
            <div class="row-num row-num-value mono text-neutral-500">${fmtRoas(a.format_benchmark.static.roas)}</div>
            <div class="row-num row-num-value mono text-neutral-500">—</div>
            <div class="row-num row-num-value mono text-neutral-500">—</div>
          </div>
          <div class="grid" style="grid-template-columns: 1fr repeat(3, 100px); padding: 14px 16px;">
            <div class="row-name text-neutral-500">Snitt carousel</div>
            <div class="row-num row-num-value mono text-neutral-500">${fmtRoas(a.format_benchmark.carousel.roas)}</div>
            <div class="row-num row-num-value mono text-neutral-500">${a.format_benchmark.carousel.hook} %</div>
            <div class="row-num row-num-value mono text-neutral-500">${a.format_benchmark.carousel.hold} %</div>
          </div>
        </div>
        <p class="text-xs text-neutral-500 mt-3">Denne over snitt på alle dimensjoner.</p>
      </div>
    </section>
    ` : ''}
  `;

  return html;
}

// ─── Main render ─────────────────────────────────────────────────────────

function render() {
  renderBreadcrumb();
  const main = document.getElementById('main-view');
  if (state.niva === 1) main.innerHTML = renderNiva1();
  else if (state.niva === 2) main.innerHTML = renderNiva2();
  else if (state.niva === 3) main.innerHTML = renderNiva3();
  else if (state.niva === 4) main.innerHTML = renderNiva4();
}

// Init
render();
</script>

</body>
</html>
