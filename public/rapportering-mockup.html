function buildDailySeries(days, avgSpend, avgNye, avgMer, variance) {
  const arr = [];
  for (let i = 1; i <= days; i++) {
    const s = avgSpend * (1 + (Math.sin(i / 2) * variance) + (Math.random() - 0.5) * 0.15);
    const m = avgMer * (1 + (Math.cos(i / 3) * 0.12) + (Math.random() - 0.5) * 0.10);
    arr.push({ x: i.toString(), spend: Math.round(s), mer: Math.round(m) });
  }
  return arr;
}

function buildWeeklySeries(weeks, avgSpend, avgMer) {
  const arr = [];
  for (let i = 1; i <= weeks; i++) {
    const s = avgSpend * (1 + (Math.sin(i / 1.5) * 0.20));
    const m = avgMer * (1 + (Math.cos(i / 2) * 0.10));
    arr.push({ x: `U${i}`, spend: Math.round(s), mer: Math.round(m) });
  }
  return arr;
}

function buildDailyCalendar(monthName, days, allPast, todayDay) {
  const arr = [];
  for (let day = 1; day <= days; day++) {
    const isPast = allPast || (todayDay && day < todayDay);
    const isToday = todayDay && day === todayDay;
    const budgetSpend = 138000 / 30;
    const budgetNye = 125 / 30;
    const forecastSpend = day <= 17 ? 4500 : 3200;
    const forecastNye = forecastSpend / 900;
    const actualSpend = isPast ? forecastSpend * (0.85 + Math.random() * 0.3) : null;
    const actualNye = actualSpend ? Math.round(actualSpend / 850) : null;
    arr.push({ day, isPast, isToday, budgetSpend, budgetNye, forecastSpend, forecastNye, actualSpend, actualNye });
  }
  return arr;
}

function buildReachDaily(days, baseRolling, baseNetNew) {
  const arr = [];
  let cum = baseRolling;
  for (let i = 1; i <= days; i++) {
    const nn = Math.round(baseNetNew * (0.8 + Math.random() * 0.4));
    cum += nn;
    arr.push({ x: i.toString(), rolling: cum, netNew: nn });
  }
  return arr;
}
function buildReachWeekly(weeks, baseRolling, baseNetNew) {
  const arr = [];
  let cum = baseRolling;
  for (let i = 1; i <= weeks; i++) {
    const nn = Math.round(baseNetNew * (0.85 + Math.random() * 0.30));
    cum += nn;
    arr.push({ x: `U${i}`, rolling: cum, netNew: nn });
  }
  return arr;
}
function buildReachMonthly(months, baseRolling, baseNetNew) {
  const arr = [];
  const labels = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  let cum = baseRolling;
  for (let i = 0; i < months; i++) {
    const nn = Math.round(baseNetNew * (0.85 + Math.random() * 0.30));
    cum += nn;
    arr.push({ x: labels[i], rolling: cum, netNew: nn });
  }
  return arr;
}

  kanal: null,
  kampanje: null,
  grouping: 'none',
};

// ─── Helpers ──────────────────────────────────────────────────────────────

function fmtKr(v) { if (v == null) return '—'; if (v >= 1000) return `${(v / 1000).toFixed(v >= 10000 ? 0 : 1)}k`; return Math.round(v).toString(); }
function pct(v) { return `${Math.round(v * 100)}%`; }
function pctSigned(v, d=1) { if (v == null) return '—'; return `${v > 0 ? '+' : ''}${(v * 100).toFixed(d)} %`; }

function deltaTone(d, higherIsBad) {
  if (d == null) return 'delta-neutral';
  const good = higherIsBad ? d < 0 : d > 0;
  if (Math.abs(d) < 0.005) return 'delta-neutral';
  return good ? 'delta-good' : 'delta-bad';
}

function distribution(ads) {
  const sum = STATUS_ORDER.reduce((s, st) => s + (ads[st] || 0), 0);
  return STATUS_ORDER.map(st => ({ status: st, share: sum > 0 ? (ads[st] || 0) / sum : 0 }));
}
function stackHtml(segs) {
  return segs.filter(s => s.share > 0).map(s => `<div class="seg-${s.status}" style="width:${s.share * 100}%"></div>`).join('');
}
function statusLegend(dist) {
  return STATUS_ORDER.map(st => {
    const seg = dist.find(s => s.status === st);
    if (!seg || seg.share === 0) return null;
    return `<div><span class="stack-legend-dot" style="background:${STATUS_COLORS[st]}"></span><span>${STATUS_LABELS[st]} <span class="mono text-neutral-500 ml-0.5">${pct(seg.share)}</span></span></div>`;
  }).filter(Boolean).join('');
}

// ─── SVG-grafer ──────────────────────────────────────────────────────────

function spendVsMerSvg(points, merLabel) {
  const w = 700, h = 220;
  const padL = 50, padR = 50, padT = 16, padB = 36;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;

  const maxSpend = Math.max(...points.map(p => p.spend)) * 1.1;
  const merVals = points.map(p => p.mer).filter(v => v != null);
  const minMer = Math.min(...merVals);
  const maxMer = Math.max(...merVals);
  const merRange = maxMer - minMer || 1;
  const merMin = minMer - merRange * 0.15;
  const merMax = maxMer + merRange * 0.15;

  const barW = innerW / points.length * 0.7;
  const barGap = innerW / points.length * 0.3;

  // Bars (spend)
  let bars = '';
  points.forEach((p, i) => {
    const x = padL + i * (innerW / points.length) + barGap / 2;
    const bh = (p.spend / maxSpend) * innerH;
    const y = padT + innerH - bh;
    bars += `<rect class="chart-bar" x="${x}" y="${y}" width="${barW}" height="${bh}" rx="2" />`;
  });

  // Line (MER)
  const linePoints = points.map((p, i) => {
    const x = padL + i * (innerW / points.length) + (innerW / points.length) / 2;
    const y = padT + innerH - ((p.mer - merMin) / (merMax - merMin)) * innerH;
    return [x, y];
  });
  const linePath = `M ${linePoints[0][0]} ${linePoints[0][1]} ` + linePoints.slice(1).map(([x, y]) => `L ${x} ${y}`).join(' ');
  const dots = linePoints.map(([x, y]) => `<circle class="chart-dot" cx="${x}" cy="${y}" r="3" />`).join('');

  // Y-akse-tekst (venstre = Spend)
  const spendSteps = [0, maxSpend * 0.5, maxSpend];
  const yLeftTicks = spendSteps.map(v => {
    const y = padT + innerH - (v / maxSpend) * innerH;
    return `<text x="${padL - 8}" y="${y + 3}" text-anchor="end" class="chart-y-label">${fmtKr(v)}</text>`;
  }).join('');

  // Y-akse-tekst (høyre = MER)
  const merSteps = [merMin, (merMin + merMax) / 2, merMax];
  const yRightTicks = merSteps.map(v => {
    const y = padT + innerH - ((v - merMin) / (merMax - merMin)) * innerH;
    return `<text x="${w - padR + 8}" y="${y + 3}" text-anchor="start" class="chart-y-label">${Math.round(v)}</text>`;
  }).join('');

  // X-labels (vise hver Nth for å unngå overlapp)
  const stride = Math.ceil(points.length / 12);
  const xLabels = points.map((p, i) => {
    if (i % stride !== 0 && i !== points.length - 1) return '';
    const x = padL + i * (innerW / points.length) + (innerW / points.length) / 2;
    return `<text x="${x}" y="${h - 14}" text-anchor="middle" class="chart-x-label">${p.x}</text>`;
  }).join('');

  // Header
  const header = `
    <div class="flex items-center justify-between mb-3">
      <p class="eyebrow">Spend vs ${merLabel}</p>
      <div class="flex items-center gap-4 text-xs text-neutral-500">
        <div class="flex items-center gap-1.5"><span class="legend-bar" style="width:12px;height:8px;background:#cbd5e1;border-radius:2px;"></span> Spend</div>
        <div class="flex items-center gap-1.5"><span style="width:12px;height:2px;background:#090a08;"></span> ${merLabel}</div>
      </div>
    </div>
  `;

  return `${header}<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${yLeftTicks}${yRightTicks}${bars}<path class="chart-line" d="${linePath}" />${dots}${xLabels}</svg>`;
}

function reachSvg(points) {
  const w = 700, h = 220;
  const padL = 50, padR = 50, padT = 16, padB = 36;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;

  const maxNetNew = Math.max(...points.map(p => p.netNew)) * 1.15;
  const minRolling = Math.min(...points.map(p => p.rolling));
  const maxRolling = Math.max(...points.map(p => p.rolling));
  const rRange = maxRolling - minRolling || 1;
  const rMin = minRolling - rRange * 0.15;
  const rMax = maxRolling + rRange * 0.1;

  const barW = innerW / points.length * 0.7;
  const barGap = innerW / points.length * 0.3;

  let bars = '';
  points.forEach((p, i) => {
    const x = padL + i * (innerW / points.length) + barGap / 2;
    const bh = (p.netNew / maxNetNew) * innerH;
    const y = padT + innerH - bh;
    bars += `<rect fill="#34d399" x="${x}" y="${y}" width="${barW}" height="${bh}" rx="2" />`;
  });

  const linePoints = points.map((p, i) => {
    const x = padL + i * (innerW / points.length) + (innerW / points.length) / 2;
    const y = padT + innerH - ((p.rolling - rMin) / (rMax - rMin)) * innerH;
    return [x, y];
  });
  const linePath = `M ${linePoints[0][0]} ${linePoints[0][1]} ` + linePoints.slice(1).map(([x, y]) => `L ${x} ${y}`).join(' ');
  const dots = linePoints.map(([x, y]) => `<circle class="chart-dot" cx="${x}" cy="${y}" r="3" />`).join('');

  const netNewSteps = [0, maxNetNew * 0.5, maxNetNew];
  const yLeftTicks = netNewSteps.map(v => {
    const y = padT + innerH - (v / maxNetNew) * innerH;
    return `<text x="${padL - 8}" y="${y + 3}" text-anchor="end" class="chart-y-label">${fmtKr(v)}</text>`;
  }).join('');

  const rollingSteps = [rMin, (rMin + rMax) / 2, rMax];
  const yRightTicks = rollingSteps.map(v => {
    const y = padT + innerH - ((v - rMin) / (rMax - rMin)) * innerH;
    return `<text x="${w - padR + 8}" y="${y + 3}" text-anchor="start" class="chart-y-label">${fmtKr(v)}</text>`;
  }).join('');

  const stride = Math.ceil(points.length / 12);
  const xLabels = points.map((p, i) => {
    if (i % stride !== 0 && i !== points.length - 1) return '';
    const x = padL + i * (innerW / points.length) + (innerW / points.length) / 2;
    return `<text x="${x}" y="${h - 14}" text-anchor="middle" class="chart-x-label">${p.x}</text>`;
  }).join('');

  const header = `
    <div class="flex items-center justify-between mb-3">
      <p class="eyebrow">Rolling reach + Net new</p>
      <div class="flex items-center gap-4 text-xs text-neutral-500">
        <div class="flex items-center gap-1.5"><span style="width:12px;height:8px;background:#34d399;border-radius:2px;"></span> Net new</div>
        <div class="flex items-center gap-1.5"><span style="width:12px;height:2px;background:#090a08;"></span> Rolling reach</div>
      </div>
    </div>
  `;

  return `${header}<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${yLeftTicks}${yRightTicks}${bars}<path class="chart-line" d="${linePath}" />${dots}${xLabels}</svg>`;
}

function renderResultat() {
  const d = PERIODE_DATA[state.periode];
  const stage = d.isPast ? 'Resultat' : 'Forecast';
  const spendDelta = (d.spend - d.budget.spend) / d.budget.spend;
  const nyeDelta = (d.nye - d.budget.nye) / d.budget.nye;
  const cacDelta = (d.cac - d.budget.targetCac) / d.budget.targetCac;
  const init = d.initialDiff;

  // Kanalmix
  const kanalSegs = KANALMIX.map(k => `<div class="seg-${k.slug}" style="width:${k.share * 100}%"></div>`).join('');
  const kanalLegend = KANALMIX.map(k => `<div><span class="stack-legend-dot seg-${k.slug}"></span><span>${k.navn} <span class="mono text-neutral-500 ml-0.5">${pct(k.share)}</span></span></div>`).join('');

  let html = `
    <!-- Hovedkort -->
    <div class="hero mb-6">
      <p class="eyebrow">${d.sublabel}</p>
      <div class="hero-kpis mt-4" style="grid-template-columns: repeat(3, 1fr);">
        ${kpiBlock('Spend', stage, fmtKr(d.spend) + ' kr', `${pctSigned(spendDelta)} vs budsjett (${fmtKr(d.budget.spend)} kr)`, deltaTone(spendDelta, true), `${pctSigned(init.spend)} vs initiell forecast`, deltaTone(init.spend, true))}
        ${kpiBlock(KUNDE.nyeLabel, stage, d.nye, `${pctSigned(nyeDelta)} vs budsjett (${d.budget.nye})`, deltaTone(nyeDelta, false), `${pctSigned(init.nye)} vs initiell forecast`, deltaTone(init.nye, false))}
        ${kpiBlock(KUNDE.merLabel, stage, d.cac + ' kr', `${pctSigned(cacDelta)} vs target (${d.budget.targetCac} kr)`, deltaTone(cacDelta, true), `${pctSigned(init.cac)} vs initiell forecast`, deltaTone(init.cac, true))}
      </div>

      <div class="mt-6 mb-2"><div class="stack tall">${kanalSegs}</div></div>
      <div class="stack-legend">${kanalLegend}</div>
    </div>

    <!-- Spend vs MER-graf -->
    <div class="chart-card mb-6">
      ${spendVsMerSvg(d.chart.points, KUNDE.merLabel)}
    </div>
  `;

  // Sub-periodes
  if (d.subPeriods) {
    html += `<p class="eyebrow mb-3">${state.periode === 'ar' ? 'Kvartaler' : 'Måneder'}</p><div class="space-y-3">`;
    d.subPeriods.forEach(s => {
      const ss = s.status === 'planned' || s.status === 'empty';
      if (ss) {
        html += `<div class="hero hero-compact hero-disabled"><h1 class="hero-title">${s.label}</h1></div>`;
        return;
      }
      const sSpendDelta = (s.spend - d.budget.spend / d.subPeriods.length) / (d.budget.spend / d.subPeriods.length);
      const sNyeDelta = (s.nye - d.budget.nye / d.subPeriods.length) / (d.budget.nye / d.subPeriods.length);
      const sCacDelta = (s.cac - d.budget.targetCac) / d.budget.targetCac;
      html += `
        <div class="hero hero-compact">
          <h1 class="hero-title mb-3">${s.label}</h1>
          <div class="hero-kpis" style="grid-template-columns: repeat(3, 1fr);">
            <div>
              <p class="hero-kpi-label">Spend</p>
              <p class="hero-kpi-value mono">${fmtKr(s.spend)} kr</p>
              <p class="hero-kpi-sub ${deltaTone(sSpendDelta, true)}">${pctSigned(sSpendDelta)} vs budsjett</p>
              <p class="hero-kpi-sub ${deltaTone(s.initialDiff.spend, true)}">${pctSigned(s.initialDiff.spend)} vs initiell</p>
            </div>
            <div>
              <p class="hero-kpi-label">${KUNDE.nyeLabel}</p>
              <p class="hero-kpi-value mono">${s.nye}</p>
              <p class="hero-kpi-sub ${deltaTone(sNyeDelta, false)}">${pctSigned(sNyeDelta)} vs budsjett</p>
              <p class="hero-kpi-sub ${deltaTone(s.initialDiff.nye, false)}">${pctSigned(s.initialDiff.nye)} vs initiell</p>
            </div>
            <div>
              <p class="hero-kpi-label">${KUNDE.merLabel}</p>
              <p class="hero-kpi-value mono">${s.cac} kr</p>
              <p class="hero-kpi-sub ${deltaTone(sCacDelta, true)}">${pctSigned(sCacDelta)} vs target</p>
              <p class="hero-kpi-sub ${deltaTone(s.initialDiff.cac, true)}">${pctSigned(s.initialDiff.cac)} vs initiell</p>
            </div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // Daglig (for uke + måned)
  if (d.daily) {
    html += `
      <div class="flex items-center justify-between mt-8 mb-3">
        <p class="eyebrow">Daglig</p>
        <button class="text-xs text-neutral-500 hover:text-neutral-900" onclick="toggleDaily()">${state.resDaily ? 'Lukk daglig' : 'Åpne daglig'}</button>
      </div>
    `;
    if (state.resDaily) {
      html += renderDailyTable(d.daily, KUNDE.nyeLabel);
    }
  }

  return html;
}

function kpiBlock(label, stage, value, sub1, tone1, sub2, tone2) {
  return `
    <div>
      <p class="hero-kpi-label">${label}</p>
      <p class="hero-kpi-stage">${stage}</p>
      <p class="hero-kpi-value mono">${value}</p>
      <p class="hero-kpi-sub ${tone1}">${sub1}</p>

          </tr>

            <th class="text-right border-l border-neutral-200" style="font-weight: 400;">Budsjett</th>
            <th class="text-right" style="font-weight: 400;">Forecast</th>
            <th class="text-right" style="font-weight: 400;">Resultat</th>
            <th class="text-right border-l border-neutral-200" style="font-weight: 400;">Budsjett</th>

  const dist = distribution(k.ads);
  const bar = stackHtml(dist);
  const legend = statusLegend(dist);

  let html = `
    <div class="hero mb-6">
      <h1 class="hero-title mb-5">${k.navn}</h1>
      <div class="hero-kpis">
        <div><p class="hero-kpi-label">Spend</p><p class="hero-kpi-value mono">${fmtKr(k.spend)} kr</p></div>
        <div><p class="hero-kpi-label">CPMr</p><p class="hero-kpi-value mono">${k.cpmr}</p></div>
        <div><p class="hero-kpi-label">Frekvens</p><p class="hero-kpi-value mono">${k.frequency.toFixed(1)}</p></div>
        <div><p class="hero-kpi-label">Net new %</p><p class="hero-kpi-value mono">${k.netNewPct}%</p></div>
        <div><p class="hero-kpi-label">Diversifisering</p><p class="hero-kpi-value mono">${k.diversification.covered}<span class="text-neutral-400">/${k.diversification.total}</span></p></div>
      </div>
      <div class="mt-6 mb-2"><div class="stack tall">${bar}</div></div>
      <div class="stack-legend">${legend}</div>
    </div>
  `;

  if (k.slug === 'meta') {
    const reach = REACH_DATA[state.periode];
    html += `<div class="chart-card mb-6">${reachSvg(reach.points)}</div>`;
  }

  html += `<p class="eyebrow mb-3">Kampanjer</p><div class="space-y-3">`;
  if (k.slug === 'meta') {
    META_KAMPANJER.forEach(c => {
      const cDist = distribution(c.ads);
      const cBar = stackHtml(cDist);
      const cLegend = statusLegend(cDist);
      const navn = c.navn.replace(/^BAU 2026 \/ /, '');
      html += `
        <div class="hero hero-compact hero-clickable" onclick="setKampanje('${c.id}')">
          <h1 class="hero-title mb-3">${navn}</h1>
          <div class="hero-kpis">
            <div><p class="hero-kpi-label">Spend</p><p class="hero-kpi-value mono">${fmtKr(c.spend)} kr</p></div>
            <div><p class="hero-kpi-label">CPMr</p><p class="hero-kpi-value mono">${c.cpmr}</p></div>
            <div><p class="hero-kpi-label">Frekvens</p><p class="hero-kpi-value mono">${c.frequency.toFixed(1)}</p></div>
            <div><p class="hero-kpi-label">Net new %</p><p class="hero-kpi-value mono">${c.netNewPct}%</p></div>
            <div><p class="hero-kpi-label">Diversifisering</p><p class="hero-kpi-value mono">${c.diversification.covered}<span class="text-neutral-400">/${c.diversification.total}</span></p></div>
          </div>
          <div class="mt-5 mb-2"><div class="stack tall">${cBar}</div></div>
          <div class="stack-legend">${cLegend}</div>
        </div>
      `;
    });
  } else {
    html += `<div class="text-sm text-neutral-500 px-1">Mock-data for ${k.navn}-kampanjer kommer.</div>`;
  }
  html += `</div>`;
  return html;
}

function renderKanalNiva3() {
  const c = META_KAMPANJER.find(x => x.id === state.kampanje);
  const dist = distribution(c.ads);
  const bar = stackHtml(dist);
  const legend = statusLegend(dist);
  const navn = c.navn.replace(/^BAU 2026 \/ /, '');
  const adCount = Object.values(c.ads).reduce((s, n) => s + n, 0);
  const dims = DIM_LEVELS.meta;

  return `
    <div class="hero mb-6">
      <h1 class="hero-title mb-5">${navn}</h1>
      <div class="hero-kpis">
        <div><p class="hero-kpi-label">Spend</p><p class="hero-kpi-value mono">${fmtKr(c.spend)} kr</p></div>
        <div><p class="hero-kpi-label">CPMr</p><p class="hero-kpi-value mono">${c.cpmr}</p></div>
        <div><p class="hero-kpi-label">Frekvens</p><p class="hero-kpi-value mono">${c.frequency.toFixed(1)}</p></div>
        <div><p class="hero-kpi-label">Net new %</p><p class="hero-kpi-value mono">${c.netNewPct}%</p></div>
        <div><p class="hero-kpi-label">Diversifisering</p><p class="hero-kpi-value mono">${c.diversification.covered}<span class="text-neutral-400">/${c.diversification.total}</span></p></div>
      </div>
      <div class="mt-6 mb-2"><div class="stack tall">${bar}</div></div>
      <div class="stack-legend">${legend}</div>
      <p class="hero-meta mt-4">${adCount} aktive annonser</p>
    </div>

    <section class="mb-10">
      <div class="flex items-center justify-between mb-3">
        <p class="eyebrow">Annonser</p>
        <select class="group-select" onchange="setGrouping(this.value)">
          <option value="none" ${state.grouping === 'none' ? 'selected' : ''}>Ingen gruppering</option>
          <option value="adset" ${state.grouping === 'adset' ? 'selected' : ''}>Ad set</option>
          <option value="format" ${state.grouping === 'format' ? 'selected' : ''}>Format</option>
        </select>
      </div>
      <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden">
        <table>
          <thead><tr><th>Navn</th><th class="num-sm">Spend</th><th class="num-sm">CPMr</th><th class="num-sm">Frekvens</th><th class="num-sm">ROAS</th><th class="col-status">Status</th></tr></thead>
          <tbody>
            ${META_ANNONSER.map(a => `
              <tr>
                <td><div class="ad-name"><div class="ad-thumb"></div><span class="text-neutral-800 truncate">${a.name}</span></div></td>
                <td class="num-sm mono font-semibold">${fmtKr(a.spend)}</td>
                <td class="num-sm mono">${a.cpm == null ? '—' : Math.round(a.cpm)}</td>
                <td class="num-sm mono">${a.freq == null ? '—' : a.freq.toFixed(1)}</td>
                <td class="num-sm mono">${a.roas == null ? '—' : a.roas.toFixed(1) + '×'}</td>
                <td class="col-status"><span class="pill pill-${a.status}">${STATUS_LABELS[a.status]}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </section>

    <section>
      <p class="eyebrow mb-3">Kreativ diversifisering</p>
      <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden">
        <table>
          <thead><tr><th>Dimensjon</th><th class="num-sm">Dekket</th><th>Verdier</th><th class="num-sm">Aktive ads</th></tr></thead>
          <tbody>
            ${dims.map(d => {
              const tot = d.covered.length + d.missing.length;
              const tags = [...d.covered.map(v => `<span class="tag tag-covered">${v}</span>`), ...d.missing.map(v => `<span class="tag tag-missing">${v}</span>`)].join('');
              return `<tr>
                <td class="font-medium text-neutral-800">${d.name}</td>
                <td class="num-sm mono"><span class="font-semibold">${d.covered.length}</span><span class="text-neutral-400">/${tot}</span></td>
                <td><div class="dim-values">${tags}</div></td>
                <td class="num-sm mono text-neutral-500">${d.activeAds}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      <p class="text-xs text-neutral-500 mt-2">Bare ads i Test/Explore/Exploit teller — Burnt-out og Suppressed ikke.</p>
    </section>
  `;
}

// ─── Main render ─────────────────────────────────────────────────────────

function render() {
  renderDatakilder();
  renderBreadcrumb();
  const main = document.getElementById('main-view');
  if (state.rapport === 'resultat') {
    main.innerHTML = renderResultat();
  } else {
    if (!state.kanal) main.innerHTML = renderKanalNiva1();
    else if (!state.kampanje) main.innerHTML = renderKanalNiva2();
    else main.innerHTML = renderKanalNiva3();
  }
}

render();
</script>

</body>
</html>
