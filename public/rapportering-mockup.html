<script>
const KUNDE = {

const TODAY = { year: 2026, month: 5, day: 12, week: 20 };
const STATUS_ORDER = ['test', 'explore', 'exploit', 'burnt', 'suppr'];
const STATUS_LABELS = { test: 'Test', explore: 'Explore', exploit: 'Exploit', burnt: 'Burnt-out', suppr: 'Suppressed' };
const STATUS_COLORS = { test: '#93c5fd', explore: '#34d399', exploit: '#fbbf24', burnt: '#f87171', suppr: '#d4d4d4' };

const KANALMIX = [
  { slug: 'meta',   navn: 'Meta',   share: 0.61 },
  { slug: 'google', navn: 'Google', share: 0.20 },
  { slug: 'snap',   navn: 'Snap',   share: 0.11 },
  { slug: 'ohh',    navn: 'OHH',    share: 0.08 },

const MONTHS = [
  { m: 1, label: 'Januar', short: 'jan', status: 'done', spend: 130000, nye: 124, cac: 1048, initialDiff: { spend: -0.06, nye: 0.01, cac: -0.07 } },
  { m: 2, label: 'Februar', short: 'feb', status: 'done', spend: 132000, nye: 116, cac: 1138, initialDiff: { spend: -0.04, nye: -0.07, cac: 0.03 } },
  { m: 3, label: 'Mars', short: 'mar', status: 'done', spend: 143000, nye: 120, cac: 1192, initialDiff: { spend: 0.04, nye: -0.04, cac: 0.08 } },
  { m: 4, label: 'April', short: 'apr', status: 'done', spend: 113350, nye: 116, cac: 974, initialDiff: { spend: -0.091, nye: 0.053, cac: -0.048 } },
  { m: 5, label: 'Mai', short: 'mai', status: 'active', spend: 102000, nye: 114, cac: 897, initialDiff: { spend: -0.13, nye: 0.06, cac: -0.07 } },
  { m: 6, label: 'Juni', short: 'jun', status: 'planned', spend: 136000, nye: 140, cac: 970, initialDiff: { spend: 0.02, nye: 0.0, cac: -0.03 } },
  { m: 7, label: 'Juli', short: 'jul', status: 'planned', spend: 125000, nye: 122, cac: 1025, initialDiff: null },
  { m: 8, label: 'August', short: 'aug', status: 'planned', spend: 115000, nye: 112, cac: 1027, initialDiff: null },
  { m: 9, label: 'September', short: 'sep', status: 'planned', spend: 130000, nye: 128, cac: 1015, initialDiff: null },
  { m: 10, label: 'Oktober', short: 'okt', status: 'planned', spend: 142000, nye: 138, cac: 1029, initialDiff: null },
  { m: 11, label: 'November', short: 'nov', status: 'empty', spend: 0, nye: 0, cac: 0, initialDiff: null },
  { m: 12, label: 'Desember', short: 'des', status: 'empty', spend: 0, nye: 0, cac: 0, initialDiff: null },
];

const QUARTERS = [
  { q: 1, label: 'Q1', monthsIds: [1, 2, 3] },
  { q: 2, label: 'Q2', monthsIds: [4, 5, 6] },
  { q: 3, label: 'Q3', monthsIds: [7, 8, 9] },
  { q: 4, label: 'Q4', monthsIds: [10, 11, 12] },
];

function monthByM(m) { return MONTHS.find(x => x.m === m); }
function quarterByQ(q) { return QUARTERS.find(x => x.q === q); }

function quarterAgg(q) {
  const months = q.monthsIds.map(monthByM);
  const allDone = months.every(m => m.status === 'done');
  const allEmpty = months.every(m => m.status === 'empty');
  const allPlanned = months.every(m => m.status === 'planned');
  const status = allDone ? 'done' : allEmpty ? 'empty' : allPlanned ? 'planned' : 'active';
  const spend = months.reduce((s, m) => s + m.spend, 0);
  const nye = months.reduce((s, m) => s + m.nye, 0);
  const cac = nye > 0 ? Math.round(spend / nye) : 0;
  const valid = months.filter(m => m.initialDiff);
  let initialDiff = null;
  if (valid.length > 0) initialDiff = {
    spend: valid.reduce((s, m) => s + m.initialDiff.spend, 0) / valid.length,
    nye: valid.reduce((s, m) => s + m.initialDiff.nye, 0) / valid.length,
    cac: valid.reduce((s, m) => s + m.initialDiff.cac, 0) / valid.length,
  };
  return { spend, nye, cac, status, initialDiff };
}

function yearAgg() {
  const spend = MONTHS.reduce((s, m) => s + m.spend, 0);
  const nye = MONTHS.reduce((s, m) => s + m.nye, 0);
  const cac = nye > 0 ? Math.round(spend / nye) : 0;
  const valid = MONTHS.filter(m => m.initialDiff);
  const initialDiff = valid.length > 0 ? {
    spend: valid.reduce((s, m) => s + m.initialDiff.spend, 0) / valid.length,
    nye: valid.reduce((s, m) => s + m.initialDiff.nye, 0) / valid.length,
    cac: valid.reduce((s, m) => s + m.initialDiff.cac, 0) / valid.length,
  } : null;
  return { spend, nye, cac, status: 'active', initialDiff };
}

function weekAgg() {
  return { spend: 28700, nye: 31, cac: 925, status: 'active', initialDiff: { spend: -0.08, nye: 0.04, cac: -0.12 } };
}

function scopeAgg() {
  if (state.nivaa === 'ar') return yearAgg();
  if (state.nivaa === 'kvartal') return quarterAgg(quarterByQ(state.kvartal));
  if (state.nivaa === 'maned') return monthByM(state.maned);
  if (state.nivaa === 'uke') return weekAgg();
}

function scopeBudget() {
  if (state.nivaa === 'ar') return KUNDE.yearBudget;
  if (state.nivaa === 'kvartal') return KUNDE.quarterBudget;
  if (state.nivaa === 'maned') return KUNDE.monthlyBudget;
  if (state.nivaa === 'uke') return KUNDE.weekBudget;
}

function scopeLabel() {
  if (state.nivaa === 'ar') return `${state.ar}`;
  if (state.nivaa === 'kvartal') return `Q${state.kvartal} ${state.ar}`;
  if (state.nivaa === 'maned') return `${monthByM(state.maned).label} ${state.ar}`;
  if (state.nivaa === 'uke') return `Uke ${state.uke}`;
}

function scopeSublabel() {
  if (state.nivaa === 'ar') return 'År';
  if (state.nivaa === 'kvartal') return 'Kvartal';
  if (state.nivaa === 'maned') return 'Måned';
  if (state.nivaa === 'uke') return 'Uke · 11 – 17. mai';
}

function buildDailyForMonth(m) {
  const daysInMonth = m === 2 ? 28 : (m === 4 || m === 6 || m === 9 || m === 11 ? 30 : 31);
  const isCurrentMonth = m === TODAY.month;
  const isPastMonth = m < TODAY.month;
  const arr = [];
  for (let day = 1; day <= daysInMonth; day++) {
    const isPast = isPastMonth || (isCurrentMonth && day < TODAY.day);
    const isToday = isCurrentMonth && day === TODAY.day;
    const budgetSpend = 138000 / 30;
    const budgetNye = 125 / 30;
    let forecastSpend = 3200;
    if (m === 5 && day >= 8 && day <= 17) forecastSpend = 4500;
    if (m === 4 && day >= 5 && day <= 18) forecastSpend = 5000;
    const forecastNye = forecastSpend / 900;
    const actualSpend = isPast ? Math.round(forecastSpend * (0.85 + Math.random() * 0.3)) : null;
    const actualNye = actualSpend ? Math.round(actualSpend / 850) : null;
    arr.push({ day, isPast, isToday, budgetSpend, budgetNye, forecastSpend, forecastNye, actualSpend, actualNye });
  }
  return arr;
}

function weeksForMonth(m) {
  if (m === 4) return [{ w: 14, dates: '30. mar – 5. apr' }, { w: 15, dates: '6 – 12. apr' }, { w: 16, dates: '13 – 19. apr' }, { w: 17, dates: '20 – 26. apr' }, { w: 18, dates: '27. apr – 3. mai' }];
  if (m === 5) return [{ w: 18, dates: '27. apr – 3. mai' }, { w: 19, dates: '4 – 10. mai' }, { w: 20, dates: '11 – 17. mai' }, { w: 21, dates: '18 – 24. mai' }, { w: 22, dates: '25 – 31. mai' }];
  if (m === 6) return [{ w: 22, dates: '25 – 31. mai' }, { w: 23, dates: '1 – 7. jun' }, { w: 24, dates: '8 – 14. jun' }, { w: 25, dates: '15 – 21. jun' }, { w: 26, dates: '22 – 28. jun' }];
  return [];
}

function dailyForWeek(w) {
  if (w === 20) {
    const arr = [];
    for (let i = 0; i < 7; i++) {
      const day = 11 + i;
      const isPast = day < TODAY.day;
      const isToday = day === TODAY.day;
      const budgetSpend = 138000 / 30;
      const budgetNye = 125 / 30;
      const forecastSpend = day >= 8 && day <= 17 ? 4500 : 3200;
      const forecastNye = forecastSpend / 900;
      const actualSpend = isPast ? Math.round(forecastSpend * (0.85 + Math.random() * 0.3)) : null;
      const actualNye = actualSpend ? Math.round(actualSpend / 850) : null;
      arr.push({ day, dateLabel: `${day}. mai`, isPast, isToday, budgetSpend, budgetNye, forecastSpend, forecastNye, actualSpend, actualNye });
    }
    return arr;
  }
  return [];
}

function spendMerSeriesFor(level) {
  if (level === 'ar') {
    return MONTHS.filter(m => m.status !== 'empty').map(m => ({ x: m.short, spend: m.spend, mer: m.cac > 0 ? m.cac : null, forecast: m.status !== 'done' && m.status !== 'active' }));
  }
  if (level === 'kvartal') {
    const arr = [];
    for (let i = 1; i <= 13; i++) {
      const isForecast = i > 7;
      const baseSpend = 30000 + Math.sin(i / 2) * 5000;
      const baseMer = 1100 + Math.cos(i / 2) * 80;
      arr.push({ x: `U${i + 13}`, spend: Math.round(baseSpend), mer: Math.round(baseMer), forecast: isForecast });
    }
    return arr;
  }
  if (level === 'maned') {
    return buildDailyForMonth(state.maned).map(d => ({ x: d.day.toString(), spend: d.actualSpend || d.forecastSpend, mer: d.actualSpend && d.actualNye ? Math.round(d.actualSpend / d.actualNye) : 900, forecast: !d.actualSpend }));
  }
  if (level === 'uke') {
    return dailyForWeek(state.uke).map(d => ({ x: d.day.toString(), spend: d.actualSpend || d.forecastSpend, mer: d.actualSpend && d.actualNye ? Math.round(d.actualSpend / d.actualNye) : 900, forecast: !d.actualSpend }));
  }
}

const KANALER_BASE = [
  { slug: 'meta', navn: 'Meta', hasPlatformData: true, cpmr: 372, frequency: 4.2, netNewPct: 14, diversification: { covered: 4, total: 9 }, ads: { test: 9, explore: 8, exploit: 4, burnt: 5, suppr: 11 } },
  { slug: 'google', navn: 'Google', hasPlatformData: false },
  { slug: 'snap', navn: 'Snap', hasPlatformData: true, cpmr: 218, frequency: 3.1, netNewPct: 22, diversification: { covered: 2, total: 6 }, ads: { test: 2, explore: 3, exploit: 2, burnt: 1, suppr: 3 } },
  { slug: 'ohh', navn: 'OHH', hasPlatformData: false },
];

function kanalerForScope() {
  const total = scopeAgg().spend;
  return KANALER_BASE.map(k => ({ ...k, spend: Math.round(total * KANALMIX.find(m => m.slug === k.slug).share) }));
}

const META_KAMPANJER = [
  { id: 'c1', navn: 'BAU 2026 / Vårsalg-Bestselgere', spend: 52000, cpmr: 285, frequency: 3.4, netNewPct: 22, diversification: { covered: 4, total: 12 }, ads: { test: 1, explore: 1, exploit: 1, burnt: 0, suppr: 5 } },
  { id: 'c2', navn: 'BAU 2026 / Konvertering-Warm', spend: 42000, cpmr: 462, frequency: 5.6, netNewPct: 4, diversification: { covered: 2, total: 12 }, ads: { test: 0, explore: 0, exploit: 4, burnt: 4, suppr: 6 } },
  { id: 'c3', navn: 'BAU 2026 / TOF Q2', spend: 22000, cpmr: 318, frequency: 2.9, netNewPct: 78, diversification: { covered: 4, total: 12 }, ads: { test: 8, explore: 4, exploit: 1, burnt: 0, suppr: 2 } },

const META_ANNONSER = [
  { name: 'Video-Vårsalg-Perlemor', adset: 'Lookalike-1pct', format: 'Video', spend: 28000, cpm: 312, freq: 4.2, roas: 3.8, status: 'exploit' },

function reachSeriesForLevel(level) {
  const labels = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  if (level === 'ar') {
    const arr = []; let cum = 480000;
    for (let i = 0; i < 10; i++) { const nn = Math.round(38000 * (0.85 + Math.random() * 0.30)); cum += nn; arr.push({ x: labels[i], rolling: cum, netNew: nn }); }
    return arr;
  }
  if (level === 'kvartal') {
    const arr = []; let cum = 480000;
    for (let i = 1; i <= 13; i++) { const nn = Math.round(22000 * (0.85 + Math.random() * 0.30)); cum += nn; arr.push({ x: `U${i + 13}`, rolling: cum, netNew: nn }); }
    return arr;
  }
  if (level === 'maned') {
    const arr = []; let cum = 540000;
    for (let i = 1; i <= 31; i++) { const nn = Math.round(3500 * (0.8 + Math.random() * 0.4)); cum += nn; arr.push({ x: i.toString(), rolling: cum, netNew: nn }); }
    return arr;
  }
  if (level === 'uke') {
    const arr = []; let cum = 550000;
    for (let i = 11; i <= 17; i++) { const nn = Math.round(4500 * (0.8 + Math.random() * 0.4)); cum += nn; arr.push({ x: i.toString(), rolling: cum, netNew: nn }); }
    return arr;
  }
}

function fmtKr(v) { if (v == null) return '—'; if (v >= 1000) return `${(v / 1000).toFixed(v >= 10000 ? 0 : 1)}k`; return Math.round(v).toString(); }
function pct(v) { return `${Math.round(v * 100)}%`; }
function pctSigned(v, d=1) { if (v == null) return '—'; return `${v > 0 ? '+' : ''}${(v * 100).toFixed(d)} %`; }

function deltaTone(d, higherIsBad) {
  if (d == null) return 'delta-neutral';
  if (Math.abs(d) < 0.005) return 'delta-neutral';
  const good = higherIsBad ? d < 0 : d > 0;
  return good ? 'delta-good' : 'delta-bad';
}

function distribution(ads) {
  const sum = STATUS_ORDER.reduce((s, st) => s + (ads[st] || 0), 0);
  return STATUS_ORDER.map(st => ({ status: st, share: sum > 0 ? (ads[st] || 0) / sum : 0 }));
}
function stackHtml(segs) { return segs.filter(s => s.share > 0).map(s => `<div class="seg-${s.status}" style="width:${s.share * 100}%"></div>`).join(''); }
function statusLegend(dist) {
  return STATUS_ORDER.map(st => {
    const seg = dist.find(s => s.status === st);
    if (!seg || seg.share === 0) return null;
    return `<div><span class="stack-legend-dot" style="background:${STATUS_COLORS[st]}"></span><span>${STATUS_LABELS[st]} <span class="mono text-neutral-500 ml-0.5">${pct(seg.share)}</span></span></div>`;
  }).filter(Boolean).join('');
}

function spendVsMerSvg(points, merLabel) {
  const w = 700, h = 220, padL = 50, padR = 50, padT = 16, padB = 36;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const validPts = points.filter(p => p.spend != null);
  const maxSpend = Math.max(...validPts.map(p => p.spend)) * 1.1;
  const merVals = validPts.map(p => p.mer).filter(v => v != null);
  const minMer = Math.min(...merVals), maxMer = Math.max(...merVals);
  const merRange = maxMer - minMer || 1;
  const merMin = minMer - merRange * 0.2, merMax = maxMer + merRange * 0.2;
  const barW = innerW / points.length * 0.7;
  const barGap = innerW / points.length * 0.3;

  let bars = '';
  points.forEach((p, i) => {
    const x = padL + i * (innerW / points.length) + barGap / 2;
    const bh = (p.spend / maxSpend) * innerH;
    const y = padT + innerH - bh;
    bars += `<rect class="${p.forecast ? 'chart-bar-forecast' : 'chart-bar-actual'}" x="${x}" y="${y}" width="${barW}" height="${bh}" rx="2" />`;
  });

  const linePts = points.map((p, i) => ({
    x: padL + i * (innerW / points.length) + (innerW / points.length) / 2,
    y: p.mer != null ? padT + innerH - ((p.mer - merMin) / (merMax - merMin)) * innerH : null,
    forecast: p.forecast,
  })).filter(p => p.y !== null);

  let lineActualPts = linePts.filter(p => !p.forecast);
  let lineForecastPts = linePts.filter(p => p.forecast);
  if (lineActualPts.length > 0 && lineForecastPts.length > 0) lineForecastPts = [lineActualPts[lineActualPts.length - 1], ...lineForecastPts];
  const lineActualPath = lineActualPts.length > 1 ? `M ${lineActualPts[0].x} ${lineActualPts[0].y} ` + lineActualPts.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ') : '';
  const lineForecastPath = lineForecastPts.length > 1 ? `M ${lineForecastPts[0].x} ${lineForecastPts[0].y} ` + lineForecastPts.slice(1).map(p => `L ${p.x} ${p.y}`).join(' ') : '';
  const dots = linePts.map(p => `<circle class="${p.forecast ? 'chart-dot-forecast' : 'chart-dot'}" cx="${p.x}" cy="${p.y}" r="3" />`).join('');

  const yLeftTicks = [0, maxSpend * 0.5, maxSpend].map(v => {
    const y = padT + innerH - (v / maxSpend) * innerH;
    return `<text x="${padL - 8}" y="${y + 3}" text-anchor="end" class="chart-y-label">${fmtKr(v)}</text>`;
  }).join('');
  const yRightTicks = [merMin, (merMin + merMax) / 2, merMax].map(v => {
    const y = padT + innerH - ((v - merMin) / (merMax - merMin)) * innerH;
    return `<text x="${w - padR + 8}" y="${y + 3}" text-anchor="start" class="chart-y-label">${Math.round(v)}</text>`;
  }).join('');
  const stride = Math.ceil(points.length / 12);
  const xLabels = points.map((p, i) => {
    if (i % stride !== 0 && i !== points.length - 1) return '';
    const x = padL + i * (innerW / points.length) + (innerW / points.length) / 2;
    return `<text x="${x}" y="${h - 14}" text-anchor="middle" class="chart-x-label">${p.x}</text>`;
  }).join('');

  return `
    <div class="flex items-center justify-between mb-3">
      <p class="eyebrow">Spend vs ${merLabel}</p>
      <div class="flex items-center gap-4 text-xs text-neutral-500">
        <div class="flex items-center gap-1.5"><span style="width:12px;height:8px;background:#cbd5e1;border-radius:2px;"></span> Faktisk</div>
        <div class="flex items-center gap-1.5"><span style="width:12px;height:8px;background:#e5e5e5;border-radius:2px;"></span> Forecast</div>
      </div>
    </div>
    <svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${yLeftTicks}${yRightTicks}${bars}<path class="chart-line" d="${lineActualPath}" /><path class="chart-line-forecast" d="${lineForecastPath}" />${dots}${xLabels}</svg>
  `;
}

function reachSvg(points) {
  const w = 700, h = 220, padL = 50, padR = 50, padT = 16, padB = 36;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const maxNetNew = Math.max(...points.map(p => p.netNew)) * 1.15;
  const minRolling = Math.min(...points.map(p => p.rolling)), maxRolling = Math.max(...points.map(p => p.rolling));
  const rRange = maxRolling - minRolling || 1;
  const rMin = minRolling - rRange * 0.15, rMax = maxRolling + rRange * 0.1;
  const barW = innerW / points.length * 0.7;
  const barGap = innerW / points.length * 0.3;

  let bars = '';
  points.forEach((p, i) => {
    const x = padL + i * (innerW / points.length) + barGap / 2;
    const bh = (p.netNew / maxNetNew) * innerH;
    const y = padT + innerH - bh;
    bars += `<rect fill="#34d399" x="${x}" y="${y}" width="${barW}" height="${bh}" rx="2" />`;
  });
  const linePoints = points.map((p, i) => {
    const x = padL + i * (innerW / points.length) + (innerW / points.length) / 2;
    const y = padT + innerH - ((p.rolling - rMin) / (rMax - rMin)) * innerH;
    return [x, y];
  });
  const linePath = `M ${linePoints[0][0]} ${linePoints[0][1]} ` + linePoints.slice(1).map(([x, y]) => `L ${x} ${y}`).join(' ');
  const dots = linePoints.map(([x, y]) => `<circle class="chart-dot" cx="${x}" cy="${y}" r="3" />`).join('');
  const yLeftTicks = [0, maxNetNew * 0.5, maxNetNew].map(v => {
    const y = padT + innerH - (v / maxNetNew) * innerH;
    return `<text x="${padL - 8}" y="${y + 3}" text-anchor="end" class="chart-y-label">${fmtKr(v)}</text>`;
  }).join('');
  const yRightTicks = [rMin, (rMin + rMax) / 2, rMax].map(v => {
    const y = padT + innerH - ((v - rMin) / (rMax - rMin)) * innerH;
    return `<text x="${w - padR + 8}" y="${y + 3}" text-anchor="start" class="chart-y-label">${fmtKr(v)}</text>`;
  }).join('');
  const stride = Math.ceil(points.length / 12);
  const xLabels = points.map((p, i) => {
    if (i % stride !== 0 && i !== points.length - 1) return '';
    const x = padL + i * (innerW / points.length) + (innerW / points.length) / 2;
    return `<text x="${x}" y="${h - 14}" text-anchor="middle" class="chart-x-label">${p.x}</text>`;
  }).join('');

  return `
    <div class="flex items-center justify-between mb-3">
      <p class="eyebrow">Rolling reach + Net new</p>
      <div class="flex items-center gap-4 text-xs text-neutral-500">
        <div class="flex items-center gap-1.5"><span style="width:12px;height:8px;background:#34d399;border-radius:2px;"></span> Net new</div>
        <div class="flex items-center gap-1.5"><span style="width:12px;height:2px;background:#090a08;"></span> Rolling reach</div>
      </div>
    </div>
    <svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${yLeftTicks}${yRightTicks}${bars}<path class="chart-line" d="${linePath}" />${dots}${xLabels}</svg>
  `;
}

          <div class="flex items-center justify-between mb-3">
            <h1 class="hero-title">${m.label} ${state.ar}</h1>
            ${!disabled ? `<span class="text-xs text-neutral-500">${stage}</span>` : ''}
          </div>
          ${!disabled ? `
            <div class="hero-kpis" style="grid-template-columns: repeat(3, 1fr);">
              <div><p class="hero-kpi-label">Spend</p><p class="hero-kpi-value mono">${fmtKr(m.spend)} kr</p><p class="hero-kpi-sub ${deltaTone(sd, true)}">${pctSigned(sd)} vs budsjett</p></div>
              <div><p class="hero-kpi-label">${KUNDE.nyeLabel}</p><p class="hero-kpi-value mono">${m.nye}</p><p class="hero-kpi-sub ${deltaTone(nd, false)}">${pctSigned(nd)} vs budsjett</p></div>
              <div><p class="hero-kpi-label">${KUNDE.merLabel}</p><p class="hero-kpi-value mono">${m.cac > 0 ? m.cac + ' kr' : '—'}</p>${cd != null ? `<p class="hero-kpi-sub ${deltaTone(cd, true)}">${pctSigned(cd)} vs target</p>` : ''}</div>
            </div>
          ` : ''}
        </div>
      `;
    });
    return html + `</div>`;
  }
  if (state.nivaa === 'maned') {
    const weeks = weeksForMonth(state.maned);
    let html = `<p class="eyebrow mb-3">Uker</p><div class="week-strip">`;
    weeks.forEach(w => {
      const disabled = (state.maned > TODAY.month) || (state.maned === TODAY.month && w.w > TODAY.week + 1);
      html += `
        <div class="week-tab ${disabled ? 'disabled' : ''}" ${!disabled ? `onclick="setNivaa('uke', {maned: ${state.maned}, uke: ${w.w}})"` : ''}>
          <div class="week-tab-num">Uke ${w.w}</div>
          <div class="week-tab-dates">${w.dates}</div>
        </div>
      `;
    });
    return html + `</div>`;
  }
  return '';
}

function renderDaglig() {
  if (state.nivaa !== 'maned' && state.nivaa !== 'uke') return '';
  const days = state.nivaa === 'maned' ? buildDailyForMonth(state.maned) : dailyForWeek(state.uke);
  if (days.length === 0) return '';
  const useDateLabel = state.nivaa === 'uke';
  let rows = '';
  days.forEach(d => {
    const cac = d.actualSpend && d.actualNye ? d.actualSpend / d.actualNye : null;
    rows += `
      <tr class="${d.isToday ? 'today' : ''}">
        <td class="${d.isPast ? '' : 'text-neutral-400'}">${useDateLabel ? d.dateLabel : d.day}</td>
        <td class="text-right cell-budget border-l border-neutral-100">${fmtKr(d.budgetSpend)}</td>
        <td class="text-right cell-forecast">${fmtKr(d.forecastSpend)}</td>
        <td class="text-right ${d.actualSpend ? 'cell-actual' : 'text-neutral-300'}">${d.actualSpend ? fmtKr(d.actualSpend) : '–'}</td>
        <td class="text-right cell-budget border-l border-neutral-100">${d.budgetNye.toFixed(1)}</td>
        <td class="text-right cell-forecast">${d.forecastNye.toFixed(1)}</td>
        <td class="text-right ${d.actualNye ? 'cell-actual' : 'text-neutral-300'}">${d.actualNye ? d.actualNye : '–'}</td>
        <td class="text-right ${cac ? 'cell-actual' : 'text-neutral-300'} border-l border-neutral-100">${cac ? Math.round(cac) + ' kr' : '–'}</td>
      </tr>
    `;
  });
  return `
    <p class="eyebrow mb-3 mt-6">Daglig</p>
    <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden mb-6">
      <table class="day-table">
        <thead>
          <tr>
            <th rowspan="2" style="vertical-align: bottom;">Dag</th>
            <th colspan="3" class="text-right border-l border-neutral-200">Spend</th>
            <th colspan="3" class="text-right border-l border-neutral-200">${KUNDE.nyeLabel}</th>
            <th rowspan="2" class="text-right border-l border-neutral-200" style="vertical-align: bottom;">CAC</th>
          </tr>
          <tr style="border-bottom: 1px solid #e5e5e5;">
            <th class="text-right border-l border-neutral-200" style="font-weight: 400;">Budsjett</th>
            <th class="text-right" style="font-weight: 400;">Forecast</th>
            <th class="text-right" style="font-weight: 400;">Resultat</th>
            <th class="text-right border-l border-neutral-200" style="font-weight: 400;">Budsjett</th>
            <th class="text-right" style="font-weight: 400;">Forecast</th>
            <th class="text-right" style="font-weight: 400;">Resultat</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function renderKanalKort() {
  const kanaler = kanalerForScope();
  let html = `<p class="eyebrow mb-3 mt-6">Kanaler</p><div class="space-y-3">`;
  kanaler.forEach(k => {
    if (k.hasPlatformData) {
      const dist = distribution(k.ads);
      html += `
        <div class="hero hero-compact hero-clickable" onclick="setKanal('${k.slug}')">
          <h1 class="hero-title mb-3">${k.navn}</h1>
          <div class="hero-kpis">
            <div><p class="hero-kpi-label">Spend</p><p class="hero-kpi-value mono">${fmtKr(k.spend)} kr</p></div>
            <div><p class="hero-kpi-label">CPMr</p><p class="hero-kpi-value mono">${k.cpmr}</p></div>
            <div><p class="hero-kpi-label">Frekvens</p><p class="hero-kpi-value mono">${k.frequency.toFixed(1)}</p></div>
            <div><p class="hero-kpi-label">Net new %</p><p class="hero-kpi-value mono">${k.netNewPct}%</p></div>
            <div><p class="hero-kpi-label">Diversifisering</p><p class="hero-kpi-value mono">${k.diversification.covered}<span class="text-neutral-400">/${k.diversification.total}</span></p></div>
          </div>
          <div class="mt-5 mb-2"><div class="stack tall">${stackHtml(dist)}</div></div>
          <div class="stack-legend">${statusLegend(dist)}</div>
        </div>
      `;
    } else {
      html += `
        <div class="hero hero-compact" style="background: #fafafa;">
          <div class="flex items-center justify-between mb-2">
            <h1 class="hero-title">${k.navn}</h1>
            <span class="text-xs text-neutral-500">Kun manuell spend</span>
          </div>
          <div><p class="hero-kpi-label">Spend</p><p class="hero-kpi-value mono">${fmtKr(k.spend)} kr</p></div>
        </div>
      `;
    }
  });
  return html + `</div>`;
}

function renderKampanjeKort() {
  if (state.kanal !== 'meta') return `<p class="eyebrow mb-3 mt-6">Kampanjer</p><div class="text-sm text-neutral-500 px-1">Mock-data for ${state.kanal} kommer.</div>`;
  let html = `<p class="eyebrow mb-3 mt-6">Kampanjer</p><div class="space-y-3">`;
  META_KAMPANJER.forEach(c => {
    const dist = distribution(c.ads);
    const navn = c.navn.replace(/^BAU 2026 \/ /, '');
    html += `
      <div class="hero hero-compact hero-clickable" onclick="setKampanje('${c.id}')">
        <h1 class="hero-title mb-3">${navn}</h1>
        <div class="hero-kpis">
          <div><p class="hero-kpi-label">Spend</p><p class="hero-kpi-value mono">${fmtKr(c.spend)} kr</p></div>
          <div><p class="hero-kpi-label">CPMr</p><p class="hero-kpi-value mono">${c.cpmr}</p></div>
          <div><p class="hero-kpi-label">Frekvens</p><p class="hero-kpi-value mono">${c.frequency.toFixed(1)}</p></div>
          <div><p class="hero-kpi-label">Net new %</p><p class="hero-kpi-value mono">${c.netNewPct}%</p></div>
          <div><p class="hero-kpi-label">Diversifisering</p><p class="hero-kpi-value mono">${c.diversification.covered}<span class="text-neutral-400">/${c.diversification.total}</span></p></div>
        </div>
        <div class="mt-5 mb-2"><div class="stack tall">${stackHtml(dist)}</div></div>
        <div class="stack-legend">${statusLegend(dist)}</div>
      </div>
    `;
  });
  return html + `</div>`;
}

function renderKampanjeDetalj() {
  const dims = DIM_LEVELS.meta;
  return `
    <section class="mb-6 mt-6">
      <div class="flex items-center justify-between mb-3">
        <p class="eyebrow">Annonser</p>
        <select class="group-select" onchange="setGrouping(this.value)">
          <option value="none" ${state.grouping === 'none' ? 'selected' : ''}>Ingen gruppering</option>
          <option value="adset" ${state.grouping === 'adset' ? 'selected' : ''}>Ad set</option>
          <option value="format" ${state.grouping === 'format' ? 'selected' : ''}>Format</option>
        </select>
      </div>
      <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden">
        <table>
          <thead><tr><th>Navn</th><th class="num-sm">Spend</th><th class="num-sm">CPMr</th><th class="num-sm">Frekvens</th><th class="num-sm">ROAS</th><th class="col-status">Status</th></tr></thead>
          <tbody>
            ${META_ANNONSER.map(a => `
              <tr>
                <td><div class="ad-name"><div class="ad-thumb"></div><span class="text-neutral-800 truncate">${a.name}</span></div></td>
                <td class="num-sm mono font-semibold">${fmtKr(a.spend)}</td>
                <td class="num-sm mono">${a.cpm == null ? '—' : Math.round(a.cpm)}</td>
                <td class="num-sm mono">${a.freq == null ? '—' : a.freq.toFixed(1)}</td>
                <td class="num-sm mono">${a.roas == null ? '—' : a.roas.toFixed(1) + '×'}</td>
                <td class="col-status"><span class="pill pill-${a.status}">${STATUS_LABELS[a.status]}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </section>

    <section class="mb-6">
      <p class="eyebrow mb-3">Kreativ diversifisering</p>
      <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden">
        <table>
          <thead><tr><th>Dimensjon</th><th class="num-sm">Dekket</th><th>Verdier</th><th class="num-sm">Aktive ads</th></tr></thead>
          <tbody>
            ${dims.map(d => {
              const tot = d.covered.length + d.missing.length;
              const tags = [...d.covered.map(v => `<span class="tag tag-covered">${v}</span>`), ...d.missing.map(v => `<span class="tag tag-missing">${v}</span>`)].join('');
              return `<tr>
                <td class="font-medium text-neutral-800">${d.name}</td>
                <td class="num-sm mono"><span class="font-semibold">${d.covered.length}</span><span class="text-neutral-400">/${tot}</span></td>
                <td><div class="dim-values">${tags}</div></td>
                <td class="num-sm mono text-neutral-500">${d.activeAds}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </section>
  `;
}

function render() {
  renderHeader();
  renderTimeStrip();
  renderBreadcrumb();
  const main = document.getElementById('main-view');

  let html = '';
  html += renderHovedkort();
  html += `<div class="chart-card mb-6">${spendVsMerSvg(spendMerSeriesFor(state.nivaa), KUNDE.merLabel)}</div>`;

  if (state.kanal === 'meta' && !state.kampanje) {
    html += `<div class="chart-card mb-6">${reachSvg(reachSeriesForLevel(state.nivaa))}</div>`;
  }

  html += renderTidsSubKort();
  html += renderDaglig();

  if (!state.kanal) html += renderKanalKort();
  else if (!state.kampanje) html += renderKampanjeKort();
  else html += renderKampanjeDetalj();

  main.innerHTML = html;
}

render();
</script>

</body>
</html>
