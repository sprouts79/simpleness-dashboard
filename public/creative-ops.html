<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreativ-rammeverk · prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #fafafa; color: #090a08; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: #737373; }

  .breadcrumb { display: inline-flex; flex-wrap: wrap; align-items: center; gap: 6px; font-size: 13px; color: #525252; }
  .breadcrumb a { color: #1f2937; text-decoration: none; padding: 3px 8px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; }
  .breadcrumb a:hover { background: white; border-color: #e5e5e5; }
  .breadcrumb .sep { color: #a3a3a3; }
  .breadcrumb .active { color: #090a08; font-weight: 600; }

  .view-toggle {
    display: inline-flex;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    padding: 2px;
    background: white;
  }
  .view-toggle button {
    padding: 5px 14px;
    font-size: 12.5px;
    font-weight: 600;
    color: #737373;
    background: transparent;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
  }
  .view-toggle button.active {
    background: #f5f5f5;
    color: #090a08;
  }

  .card {
    background: white; border: 1px solid #e5e5e5; border-radius: 12px;
    padding: 1.1rem 1.4rem;
    cursor: pointer; transition: border-color 80ms;
  }
  .card:hover { border-color: #a3a3a3; }
  .card.terminal { cursor: default; }
  .card.terminal:hover { border-color: #e5e5e5; }
  .card-name { font-size: 1rem; font-weight: 600; color: #090a08; }
  .card-sub { font-size: 13px; color: #525252; margin-top: 3px; }
  .card-meta { font-size: 12px; color: #737373; margin-top: 10px; }

  .hook-line { font-size: 15px; font-weight: 600; color: #1f2937; line-height: 1.35; }

  .tag {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 9999px;
    font-size: 11px; font-weight: 600;
    border: 1px solid;
  }
  .tag-tov-fnk { background: #f5f5f4; color: #44403c; border-color: #d6d3d1; }
  .tag-tov-emo { background: #fdf2f8; color: #9d174d; border-color: #fbcfe8; }
  .tag-tov-hum { background: #fef9c3; color: #854d0e; border-color: #fde047; }
  .tag-prod-lofi { background: #f0f9ff; color: #075985; border-color: #bae6fd; }
  .tag-prod-pro  { background: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
  .tag-prod-ai   { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
  .tag-prod-bilde{ background: #fff7ed; color: #9a3412; border-color: #fed7aa; }
  .tag-avs { background: #fafafa; color: #404040; border-color: #d4d4d4; }
  .tag-status-live { background: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
  .tag-status-plan { background: #f5f5f5; color: #525252; border-color: #d4d4d4; }
  .tag-status-paus { background: #fef2f2; color: #991b1b; border-color: #fecaca; }

  .pill-format { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: #f5f5f5; color: #525252; border: 1px solid #e5e5e5; }

  /* Tree view */
  .tree {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 20px;
  }
  .tree-malgruppe {
    background: white; border: 1px solid #e5e5e5; border-radius: 14px;
    padding: 1.25rem 1.4rem;
  }
  .tree-malgruppe-name { font-size: 1rem; font-weight: 600; color: #090a08; }
  .tree-malgruppe-sub { font-size: 12px; color: #737373; margin-top: 2px; }
  .tree-malgruppe-meta { font-size: 11px; color: #a3a3a3; margin-top: 6px; font-family: 'IBM Plex Mono', monospace; }
  .tree-motivasjon { margin-top: 16px; padding-top: 14px; border-top: 1px solid #f0f0f0; }
  .tree-motivasjon-name { font-size: 13px; font-weight: 600; color: #1f2937; margin-bottom: 6px; }
  .tree-motivasjon-vp { font-size: 12px; color: #737373; margin-bottom: 6px; }
  .tree-tema {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 0 4px 14px;
    font-size: 12.5px; color: #404040;
    cursor: pointer; border-radius: 4px;
  }
  .tree-tema:hover { background: #fafafa; }
  .tree-tema-name { flex: 1; }
  .tree-tema-empty { color: #a3a3a3; font-style: italic; }
  .tree-dots { display: inline-flex; gap: 3px; flex-shrink: 0; }
  .tree-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .tree-dot-live { background: #22c55e; }
  .tree-dot-plan { background: #d4d4d4; }
  .tree-dot-paus { background: #f87171; }

  .legend { display: inline-flex; gap: 14px; font-size: 11px; color: #737373; }
  .legend > span { display: inline-flex; align-items: center; gap: 5px; }
</style>
</head>
<body>

<div class="max-w-[1100px] mx-auto px-8 py-8">

    <div class="flex items-center gap-2 flex-wrap">

<script>

// Tema er åpen vinkel — ingen kunnskap/awareness-flag lenger
// Annonse har hook + beskrivelse + TOV
// Versjon har prod-type + avsender + format + status

// ───────────────────────────────────────────────────────────────────
// State
// ───────────────────────────────────────────────────────────────────

const state = {
  view: 'drilldown',  // 'drilldown' | 'tree'
  level: 'malgruppe',
  malgruppeId: null,
  motivasjonId: null,
  temaId: null,
  annonseId: null,
};

function setView(view) {
  state.view = view;
  document.querySelectorAll('#view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('drilldown-view').style.display = view === 'drilldown' ? '' : 'none';
  document.getElementById('tree-view').style.display = view === 'tree' ? '' : 'none';
  document.getElementById('legend').style.display = view === 'tree' ? '' : 'none';
  if (view === 'tree') renderTree();
  else renderAll();
}

function navigateTo(level, ids = {}) {
  if (level === 'malgruppe')       { state.malgruppeId = null; state.motivasjonId = null; state.temaId = null; state.annonseId = null; }
  else if (level === 'motivasjon') { state.motivasjonId = null; state.temaId = null; state.annonseId = null; }
  else if (level === 'tema')       { state.temaId = null; state.annonseId = null; }
  else if (level === 'annonse')    { state.annonseId = null; }
  state.level = level;
  if (ids.malgruppeId !== undefined) state.malgruppeId = ids.malgruppeId;
  if (ids.motivasjonId !== undefined) state.motivasjonId = ids.motivasjonId;
  if (ids.temaId !== undefined) state.temaId = ids.temaId;
  if (ids.annonseId !== undefined) state.annonseId = ids.annonseId;
  setView('drilldown');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

const findMalgruppe  = () => data.malgrupper.find(g => g.id === state.malgruppeId);
const findMotivasjon = () => findMalgruppe()?.motivasjoner.find(m => m.id === state.motivasjonId);
const findTema       = () => findMotivasjon()?.temaer.find(t => t.id === state.temaId);
const findAnnonse    = () => findTema()?.annonser.find(a => a.id === state.annonseId);

function totalAds(node) {
  if (node.versjoner) return 1;
  if (node.annonser)  return node.annonser.length;
  if (node.temaer)    return node.temaer.reduce((s, t) => s + totalAds(t), 0);
  if (node.motivasjoner) return node.motivasjoner.reduce((s, m) => s + totalAds(m), 0);
  return 0;
}

function totalVersions(node) {
  if (node.versjoner) return node.versjoner.length;
  if (node.annonser)  return node.annonser.reduce((s, a) => s + totalVersions(a), 0);
  if (node.temaer)    return node.temaer.reduce((s, t) => s + totalVersions(t), 0);
  if (node.motivasjoner) return node.motivasjoner.reduce((s, m) => s + totalVersions(m), 0);
  return 0;
}

function tovTag(tov) {
  const cls = tov === 'funksjon' ? 'tag-tov-fnk' : tov === 'emosjon' ? 'tag-tov-emo' : 'tag-tov-hum';
  return `<span class="tag ${cls}">${tov}</span>`;
}
function prodTag(prod) {
  const cls = `tag-prod-${prod === 'lo-fi' ? 'lofi' : prod}`;
  return `<span class="tag ${cls}">${PROD_LABELS[prod]}</span>`;
}
function avsenderTag(avsender) { return `<span class="tag tag-avs">${AVS_LABELS[avsender]}</span>`; }
function statusTag(status) {
  const cls = status === 'Live' ? 'tag-status-live' : status === 'Pauset' ? 'tag-status-paus' : 'tag-status-plan';
  return `<span class="tag ${cls}">${status}</span>`;
}
function prodSummary(annonse) {
  const prods = [...new Set(annonse.versjoner.map(v => PROD_LABELS[v.prod]))];
  return prods.join(' · ') || '—';
}

// ───────────────────────────────────────────────────────────────────
// Drilldown renderers
// ───────────────────────────────────────────────────────────────────

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const parts = [];
  parts.push({ label: `Kunde · ${data.kunde.navn}`, level: 'malgruppe', active: state.level === 'malgruppe' });
  if (state.malgruppeId) parts.push({ label: findMalgruppe().navn, level: 'motivasjon', active: state.level === 'motivasjon' });
  if (state.motivasjonId) parts.push({ label: findMotivasjon().navn, level: 'tema', active: state.level === 'tema' });
  if (state.temaId) parts.push({ label: findTema().navn, level: 'annonse', active: state.level === 'annonse' });
  if (state.annonseId) {
    const a = findAnnonse();
    const shortHook = a.hook.length > 40 ? a.hook.slice(0, 38) + '…' : a.hook;
    parts.push({ label: `"${shortHook}"`, level: 'versjon', active: state.level === 'versjon' });
  }
  bc.innerHTML = parts.map((p, i) => {
    const sep = i > 0 ? `<span class="sep">›</span>` : '';
    if (p.active) return `${sep}<span class="active">${p.label}</span>`;
    return `${sep}<a data-level="${p.level}">${p.label}</a>`;
  }).join('');
  bc.querySelectorAll('a[data-level]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); navigateTo(a.dataset.level); });
  });
}

function renderContext() {
  const ctx = document.getElementById('context');
  let html = '';
  if (state.level === 'motivasjon' && findMalgruppe()) {
    html = `<p class="text-sm text-neutral-600">${findMalgruppe().sub}</p>`;
  } else if (state.level === 'tema' && findMotivasjon()) {
    const m = findMotivasjon();
    html = `<p class="text-sm text-neutral-600 italic">${m.inner}</p>
            <p class="text-sm text-neutral-600 mt-2"><span class="text-neutral-400">Verdiforslag:</span> ${m.verdiforslag}</p>`;
  } else if (state.level === 'annonse' && findTema()) {
    html = '';
  } else if (state.level === 'versjon' && findAnnonse()) {
    const a = findAnnonse();
    html = `<p class="hook-line">"${a.hook}"</p>
      <div class="flex items-center gap-1.5 flex-wrap mt-3">${tovTag(a.tov)}</div>
      <p class="text-sm text-neutral-600 mt-3">${a.beskrivelse}</p>`;
  }
  ctx.innerHTML = html;
}

function renderList() {
  const title = document.getElementById('section-title');
  const list = document.getElementById('list');

  if (state.level === 'malgruppe') {
    title.textContent = 'Målgrupper';
    list.innerHTML = data.malgrupper.map(g => `
      <div class="card" data-action="drill-malgruppe" data-id="${g.id}">
        <p class="card-name">${g.navn}</p>
        <p class="card-sub">${g.sub}</p>
        <p class="card-meta mono">${g.motivasjoner.length} motivasjoner · ${totalAds(g)} annonser · ${totalVersions(g)} versjoner</p>
      </div>
    `).join('');
  } else if (state.level === 'motivasjon') {
    title.textContent = 'Motivasjoner';
    list.innerHTML = findMalgruppe().motivasjoner.map(m => `
      <div class="card" data-action="drill-motivasjon" data-id="${m.id}">
        <p class="card-name">${m.navn}</p>
        <p class="card-sub italic">${m.inner}</p>
        <p class="card-sub"><span class="text-neutral-400">Verdiforslag:</span> ${m.verdiforslag}</p>
        <p class="card-meta mono">${m.temaer.length} tema${m.temaer.length === 1 ? '' : 'er'} · ${totalAds(m)} annonser</p>
      </div>
    `).join('');
  } else if (state.level === 'tema') {
    title.textContent = 'Temaer';
    list.innerHTML = findMotivasjon().temaer.map(t => `
      <div class="card" data-action="drill-tema" data-id="${t.id}">
        <p class="card-name">${t.navn}</p>
        <p class="card-meta mono">${t.annonser.length} annonse${t.annonser.length === 1 ? '' : 'r'}</p>
      </div>
    `).join('');
  } else if (state.level === 'annonse') {
    title.textContent = 'Annonser';
    list.innerHTML = findTema().annonser.length === 0
      ? `<div class="card terminal"><p class="text-sm text-neutral-500 italic">Ingen annonser produsert under dette temaet ennå.</p></div>`
      : findTema().annonser.map(a => `
        <div class="card" data-action="drill-annonse" data-id="${a.id}">
          <p class="hook-line">"${a.hook}"</p>
          <div class="flex items-center gap-1.5 flex-wrap mt-3">${tovTag(a.tov)}</div>
          <p class="card-sub">${a.beskrivelse}</p>
          <p class="card-meta mono">${a.versjoner.length} versjon${a.versjoner.length === 1 ? '' : 'er'} · ${prodSummary(a)}</p>
        </div>
      `).join('');
  } else if (state.level === 'versjon') {
    title.textContent = 'Versjoner';
    list.innerHTML = findAnnonse().versjoner.map(v => `
      <div class="card terminal">
        <div class="flex items-center gap-1.5 flex-wrap">
          ${prodTag(v.prod)}${avsenderTag(v.avsender)}
          <span class="pill-format">${v.format}</span>
          ${statusTag(v.status)}
        </div>
      </div>
    `).join('');
  }

  list.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      const id = el.dataset.id;
      if (action === 'drill-malgruppe')  navigateTo('motivasjon', { malgruppeId: id });
      if (action === 'drill-motivasjon') navigateTo('tema',       { motivasjonId: id });
      if (action === 'drill-tema')       navigateTo('annonse',    { temaId: id });
      if (action === 'drill-annonse')    navigateTo('versjon',    { annonseId: id });
    });
  });
}

function renderAll() {
  renderBreadcrumb();
  renderContext();
  renderList();
}

// ───────────────────────────────────────────────────────────────────
// Tree view
// ───────────────────────────────────────────────────────────────────

function renderTree() {
  const root = document.getElementById('tree-root');
  root.innerHTML = data.malgrupper.map(g => {
    const motivasjonerHtml = g.motivasjoner.map(m => {
      const temaerHtml = m.temaer.map(t => {
        const dotsHtml = t.annonser.flatMap(a => a.versjoner.map(v => {
          const cls = v.status === 'Live' ? 'tree-dot-live' : v.status === 'Pauset' ? 'tree-dot-paus' : 'tree-dot-plan';
          return `<span class="tree-dot ${cls}" title="${a.hook} — ${PROD_LABELS[v.prod]} ${v.format} ${v.status}"></span>`;
        })).join('');
        const isEmpty = t.annonser.length === 0;
        const nameClass = isEmpty ? 'tree-tema-name tree-tema-empty' : 'tree-tema-name';
        return `
          <div class="tree-tema" data-tema="${t.id}" data-malgruppe="${g.id}" data-motivasjon="${m.id}">
            <span class="${nameClass}">${t.navn}</span>
            <span class="tree-dots">${dotsHtml}</span>
          </div>`;
      }).join('');
      return `
        <div class="tree-motivasjon">
          <p class="tree-motivasjon-name">${m.navn}</p>
          <p class="tree-motivasjon-vp">${m.verdiforslag}</p>
          ${temaerHtml}
        </div>`;
    }).join('');
    return `
      <div class="tree-malgruppe">
        <p class="tree-malgruppe-name">${g.navn}</p>
        <p class="tree-malgruppe-sub">${g.sub}</p>
        <p class="tree-malgruppe-meta">${g.motivasjoner.length} motivasjoner · ${totalAds(g)} annonser · ${totalVersions(g)} versjoner</p>
        ${motivasjonerHtml}
      </div>`;
  }).join('');

  // Klikk på tema i tree → drill-down til annonse-listen
  root.querySelectorAll('.tree-tema').forEach(el => {
    el.addEventListener('click', () => {
      navigateTo('annonse', {
        malgruppeId: el.dataset.malgruppe,
        motivasjonId: el.dataset.motivasjon,
        temaId: el.dataset.tema,
      });
    });
  });
}

// ───────────────────────────────────────────────────────────────────
// View toggle binding
// ───────────────────────────────────────────────────────────────────

document.querySelectorAll('#view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => setView(btn.dataset.view));
});

setView('drilldown');
</script>
